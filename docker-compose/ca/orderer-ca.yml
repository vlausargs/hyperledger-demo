services:
  ca-orderer:
    image: hyperledger/fabric-ca:1.5.5
    container_name: ca-orderer
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-orderer
      - FABRIC_CA_SERVER_CA_CERTFILE=/etc/hyperledger/fabric-ca-server-config/ca.ca.orderer.example.com-cert.pem
      - FABRIC_CA_SERVER_CA_KEYFILE=/etc/hyperledger/fabric-ca-server-config/priv_sk
      - FABRIC_CA_SERVER_TLS_ENABLED=false
      - FABRIC_CA_SERVER_DB_TYPE=postgres
      - FABRIC_CA_SERVER_DB_DATASOURCE=host=postgres-orderer port=5432 user=postgres password=orderer_postgres_password_change_this dbname=fabric_ca_orderer sslmode=disable
    ports:
      - "7054:7054"
    volumes:
      - ca-orderer_hlf_data:/etc/hyperledger/fabric-ca-server
    networks:
      - fabric_network
    command: sh -c "fabric-ca-server start -b ca.orderer.example.com-admin:ca.orderer.example.com-adminpw -d"
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 7054 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.5'

volumes:
  ca-orderer_hlf_data:
    driver: local

networks:
  fabric_network:
    driver: bridge
    name: fabric_network
