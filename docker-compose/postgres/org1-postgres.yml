services:
  postgres-org1:
    image: pgvector/pgvector:pg14
    container_name: postgres-org1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: org1_postgres_password_change_this
      POSTGRES_DB: fabric_ca_org1
    ports:
      - "5433:5432"
    volumes:
      - postgres-org1_hlf_data:/var/lib/postgresql/data
    networks:
      - fabric_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fabric_ca_org1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.5'

volumes:
  postgres-org1_hlf_data:
    driver: local

networks:
  fabric_network:
    driver: bridge
    name: fabric_network
