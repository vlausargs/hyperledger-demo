version: '3.8'

services:
  couchdb.org1.example.com:
    container_name: couchdb.org1.example.com
    image: hyperledger/fabric-couchdb:latest
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=org1_couchdb_password_change-this
    ports:
      - "5984:5984"
    volumes:
      - couchdb.org1.example.com_data:/opt/couchdb/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${COUCHDB_MEMORY_LIMIT}
          cpus: '${COUCHDB_CPU_LIMIT}'
        reservations:
          memory: ${COUCHDB_MEMORY_RESERVE}
          cpus: '${COUCHDB_CPU_RESERVE}'
    networks:
      fabric_network:

  peer0.org1.example.com:
    container_name: peer0.org1.example.com
    image: hyperledger/fabric-peer:${FABRIC_VERSION}
    environment:
      - CORE_PEER_ID=peer0.org1.example.com
      - CORE_PEER_ADDRESS=peer0.org1.example.com:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org1.example.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.example.com:8051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org1.example.com:8051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_TLS_ENABLED=${TLS_ENABLED}
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.org1.example.com:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=org1_couchdb_password_change-this
      - FABRIC_LOGGING_SPEC=${PEER_LOG_LEVEL}
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - DOCKER_HOST=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=${NETWORK_NAME}
      - FABRIC_CFG_PATH=/etc/hyperledger/fabric
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:8445
      - CORE_METRICS_PROVIDER=prometheus
      - CORE_PEER_PROFILE_ENABLED=true
      - CORE_CHAINCODE_LOGGING_LEVEL=INFO
      - CORE_CHAINCODE_LOGGING_SHIM=INFO
      - CORE_CHAINCODE_LOGGING_FORMAT= '%{color}%{time:2006-01-02 15:04:15.000 MST} [%{module}] %{shortfunc} -> %{level:.4s} %{id:03x}%{color:reset} %{message}'
      - GOPROXY=https://goproxy.cn,direct
      - GOSUMDB=off
      - GO111MODULE=on
      - CORE_CHAINCODE_BUILDER=hyperledger/fabric-ccenv:2.5
      - CORE_CHAINCODE_EXTERNALBUILDERS=[]
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: sh -c "apk add --no-cache curl docker-cli && peer node start"
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - /home/valos/workspace/myindo/hlf-demo/organizations/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/msp:/etc/hyperledger/fabric/msp
      - /home/valos/workspace/myindo/hlf-demo/organizations/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/tls:/etc/hyperledger/fabric/tls
      - /home/valos/workspace/myindo/hlf-demo/config/channel-artifacts:/etc/hyperledger/fabric/channel-artifacts
      - /home/valos/workspace/myindo/hlf-demo/organizations/peerOrganizations/org1.example.com/users/admin.org1.example.com/msp:/etc/hyperledger/fabric/admin-msp
      - /home/valos/workspace/myindo/hlf-demo/organizations/ordererOrganizations/orderer.example.com/users/ca-admin.orderer.example.com/msp:/etc/hyperledger/fabric/orderer-admin-msp
      - peer0.org1.example.com:/var/hyperledger/production
    ports:
      - 8051:8051
      - 7052:7052
      - 8445:8445
    depends_on:
      - couchdb.org1.example.com
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8445/metrics"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${PEER_MEMORY_LIMIT}
          cpus: '${PEER_CPU_LIMIT}'
        reservations:
          memory: ${PEER_MEMORY_RESERVE}
          cpus: '${PEER_CPU_RESERVE}'
    networks:
      fabric_network:
        aliases:
          -  peer0.org1.example.com

volumes:
  couchdb.org1.example.com_data:
    driver: local
  peer0.org1.example.com:
    driver: local

networks:
  fabric_network:
    name: fabric_network
    external: true
